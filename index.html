<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛵 台北橋機車瀑布模擬器 | Taipei Scooter Waterfall Simulator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-900 text-white overflow-hidden flex h-screen font-sans">

    <!-- 控制面板
         桌機：左側固定側欄
         手機：底部滑出面板（預設隱藏，按齒輪鍵展開）
    -->
    <aside id="control-panel"
        class="fixed inset-x-0 bottom-0 z-20
               max-h-[82vh] translate-y-full
               transition-transform duration-300 ease-in-out
               rounded-t-2xl
               md:static md:translate-y-0 md:max-h-full md:w-80 md:rounded-none md:z-auto
               bg-gray-800 p-5 shadow-2xl flex flex-col gap-5 overflow-y-auto">

        <!-- 手機版把手 -->
        <div class="md:hidden flex justify-center -mt-1 mb-0">
            <div class="w-10 h-1 bg-gray-600 rounded-full"></div>
        </div>

        <div>
            <h1 class="text-2xl font-bold text-yellow-400 mb-1">決戰台北橋</h1>
            <p class="text-sm text-gray-400">機車瀑布鑽車縫模擬器</p>
        </div>

        <!-- 車流量 -->
        <div class="control-group">
            <label class="block text-sm font-medium mb-2 flex justify-between">
                <span>生成車流量 (每秒)</span>
                <span id="spawn-rate-val" class="text-yellow-400">10</span>
            </label>
            <input type="range" id="spawn-rate" min="1" max="30" value="10" class="w-full accent-yellow-400">
        </div>

        <!-- 鑽車縫型比例 -->
        <div class="control-group">
            <label class="block text-sm font-medium mb-2 flex justify-between">
                <span>急躁/鑽車型 比例 (%)</span>
                <span id="aggressive-ratio-val" class="text-red-400">30</span>
            </label>
            <input type="range" id="aggressive-ratio" min="0" max="100" value="30" class="w-full accent-red-400">
        </div>

        <!-- 三寶比例 -->
        <div class="control-group">
            <label class="block text-sm font-medium mb-2 flex justify-between">
                <span>三寶/隨機偏移 比例 (%)</span>
                <span id="clueless-ratio-val" class="text-purple-400">5</span>
            </label>
            <input type="range" id="clueless-ratio" min="0" max="50" value="5" class="w-full accent-purple-400">
        </div>

        <!-- 行人流量 -->
        <div class="control-group">
            <label class="block text-sm font-medium mb-2 flex justify-between">
                <span>行人流量 (每分鐘)</span>
                <span id="ped-spawn-rate-val" class="text-green-400">3</span>
            </label>
            <input type="range" id="ped-spawn-rate" min="1" max="10" value="3" class="w-full accent-green-400">
        </div>

        <!-- 討厭行人比例 -->
        <div class="control-group">
            <label class="block text-sm font-medium mb-2 flex justify-between">
                <span>討厭行人比例 (%)</span>
                <span id="annoying-ratio-val" class="text-red-400">15</span>
            </label>
            <input type="range" id="annoying-ratio" min="0" max="50" value="15" class="w-full accent-red-400">
        </div>

        <!-- 管制線控制 -->
        <div class="control-group pt-5 border-t border-gray-700">
            <p class="block text-sm font-medium mb-3">管制線覆寫</p>
            <div class="flex gap-2">
                <button id="btn-lane-auto"   class="flex-1 bg-blue-600   hover:bg-blue-500   py-2 rounded text-sm transition">自動</button>
                <button id="btn-lane-solid"  class="flex-1 bg-yellow-600 hover:bg-yellow-500 py-2 rounded text-sm transition">強制實線</button>
                <button id="btn-lane-dashed" class="flex-1 bg-indigo-600 hover:bg-indigo-500 py-2 rounded text-sm transition">強制虛線</button>
            </div>
            <div class="mt-3 flex items-center gap-2">
                <span class="text-sm">目前狀態：</span>
                <span id="lane-status" class="text-xs text-blue-400">虛線</span>
            </div>
        </div>

        <!-- 交通號誌控制 -->
        <div class="control-group pt-5 border-t border-gray-700">
            <p class="block text-sm font-medium mb-3">交通號誌覆寫</p>
            <div class="flex gap-2">
                <button id="btn-auto"  class="flex-1 bg-blue-600  hover:bg-blue-500  py-2 rounded text-sm transition">自動</button>
                <button id="btn-red"   class="flex-1 bg-red-600   hover:bg-red-500   py-2 rounded text-sm transition">強制紅燈</button>
                <button id="btn-green" class="flex-1 bg-green-600 hover:bg-green-500 py-2 rounded text-sm transition">強制綠燈</button>
            </div>
            <div class="mt-3 flex items-center gap-2">
                <span class="text-sm">目前狀態：</span>
                <span id="light-status" class="w-3 h-3 rounded-full bg-green-500 shadow-[0_0_8px_#22c55e]"></span>
            </div>
        </div>
    </aside>

    <!-- 遮罩（手機面板開啟時） -->
    <div id="backdrop" class="hidden fixed inset-0 bg-black/50 z-10 md:hidden"></div>

    <!-- 模擬器畫布 -->
    <main class="flex-1 relative cursor-crosshair">
        <canvas id="simulation-canvas" class="w-full h-full block"></canvas>
    </main>

    <!-- 手機浮動齒輪按鈕 -->
    <button id="toggle-panel"
        class="md:hidden fixed bottom-5 right-5 z-30
               w-13 h-13 w-12 h-12 rounded-full
               bg-yellow-400 text-gray-900
               shadow-lg text-xl font-bold
               flex items-center justify-center">
        ⚙
    </button>

    <script>
        const panel    = document.getElementById('control-panel');
        const backdrop = document.getElementById('backdrop');
        const btn      = document.getElementById('toggle-panel');

        function openPanel()  {
            panel.classList.remove('translate-y-full');
            backdrop.classList.remove('hidden');
        }
        function closePanel() {
            panel.classList.add('translate-y-full');
            backdrop.classList.add('hidden');
        }

        btn.addEventListener('click', () => {
            panel.classList.contains('translate-y-full') ? openPanel() : closePanel();
        });
        backdrop.addEventListener('click', closePanel);
    </script>

    <script type="module" src="assets/js/main.js"></script>
</body>
</html>
